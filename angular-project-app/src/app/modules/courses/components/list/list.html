@if(showData){
<div class="title">
  <p>Courses</p>
</div>
<div class="mat-elevation-z8">
  <table mat-table [dataSource]="courses">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let element">{{element.title}}</td>
    </ng-container>

    <ng-container matColumnDef="teacher">
      <th mat-header-cell *matHeaderCellDef>Teacher</th>
      <td mat-cell *matCellDef="let element">{{element.teacher}}</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let element">{{element.date}}</td>
    </ng-container>

    <ng-container matColumnDef="start">
      <th mat-header-cell *matHeaderCellDef>Start</th>
      <td mat-cell *matCellDef="let element">{{element.startTime}}</td>
    </ng-container>

    <ng-container matColumnDef="end">
      <th mat-header-cell *matHeaderCellDef>End</th>
      <td mat-cell *matCellDef="let element">{{element.endTime}}</td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let element">
        <div class="action">
          <a (click)="onEdit(element)">
            <mat-icon
              aria-hidden="false"
              aria-label="edit"
              matTooltip="Edit course"
              fontIcon="create"
            ></mat-icon>
          </a>
          <a (click)="onDelete(element)">
            <mat-icon
              aria-hidden="false"
              aria-label="delete"
              matTooltip="Delete course"
              fontIcon="clear"
            ></mat-icon>
          </a>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [length]="totalElements"
    [pageSizeOptions]="[5, 10, 15]"
    (page)="onPaginate($event)"
    showFirstLastButtons
    aria-label="Select page"
  >
  </mat-paginator>
</div>
}
